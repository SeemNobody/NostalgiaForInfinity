---
# Docker Compose for Binance Futures 5-Year Backtesting
# Usage:
#   1. Download data: docker compose -f docker-compose.backtest.yml run --rm download-data
#   2. Run backtest:  docker compose -f docker-compose.backtest.yml run --rm backtest
#   3. Yearly backtest: docker compose -f docker-compose.backtest.yml run --rm backtest-2024

x-common-settings: &common-settings
  image: freqtradeorg/freqtrade:stable
  volumes:
    - "./user_data:/freqtrade/user_data"
    - "./configs:/freqtrade/configs"
    - "./NostalgiaForInfinityX7.py:/freqtrade/NostalgiaForInfinityX7.py"

services:
  # ============================================
  # Data Download Service - Download 5 years of data
  # ============================================
  download-data:
    <<: *common-settings
    container_name: nfi-download-binance-futures
    command: >
      download-data
      --exchange binance
      --trading-mode futures
      --config configs/pairlist-backtest-static-binance-futures-usdt.json
      --timeframes 5m 15m 1h 4h 1d
      --timerange 20210101-20260115
      --data-format-ohlcv feather

  # ============================================
  # Full 5-Year Backtest (WARNING: High memory usage)
  # ============================================
  backtest:
    <<: *common-settings
    container_name: nfi-backtest-binance-futures-5y
    command: >
      backtesting
      --strategy NostalgiaForInfinityX7
      --timerange 20210101-20260101
      --config configs/exampleconfig.json
      --config configs/trading_mode-futures.json
      --config configs/pairlist-backtest-static-binance-futures-usdt.json
      --config configs/blacklist-binance.json
      --breakdown day
      --export signals
      --export-filename backtest-binance-futures-5y.json
      --log-file user_data/logs/backtest-binance-futures-5y.log

  # ============================================
  # Yearly Backtests (Recommended for lower memory)
  # ============================================
  backtest-2021:
    <<: *common-settings
    container_name: nfi-backtest-binance-futures-2021
